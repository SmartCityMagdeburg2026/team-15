<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0c6b5b" />
      <stop offset="1" stop-color="#114e44" />
    </linearGradient>
  </defs>
  <!-- simple Magdeburg-inspired mark: cathedral silhouette + river wave -->
  <rect width="120" height="120" rx="18" fill="url(#g)" />
  <g transform="translate(18,22)" fill="#fff">
    <!-- Cathedral towers -->
    <rect x="6" y="6" width="10" height="36" rx="2" />
    <rect x="26" y="2" width="10" height="40" rx="2" />
    <rect x="46" y="10" width="8" height="32" rx="2" />
    <!-- small windows -->
    <circle cx="31" cy="18" r="1.2" />
    <circle cx="31" cy="24" r="1.2" />
    <circle cx="31" cy="30" r="1.2" />
    <!-- River curve -->
    <path d="M0 56 C18 48, 36 64, 60 56" stroke="#bff5e6" stroke-width="6" fill="none" stroke-linecap="round" />
  </g>
</svg>
